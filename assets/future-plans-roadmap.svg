    <rect fill="#388bfd" x="260" y="4" width="408" height="18" rx="3"/>
    <text x="678" y="16" fill="#0d1117" font-family="system-ui, Segoe UI, sans-serif" font-size="12" font-weight="600">68%</text>
  </g>
  <g transform="translate(0,310)">
    <text x="248" y="16" text-anchor="end" fill="#c9d1d9" font-family="system-ui, Segoe UI, sans-serif" font-size="13">Kubernetes + Helm</text>
    <rect fill="#388bfd" x="260" y="4" width="168" height="18" rx="3"/>
    <text x="438" y="16" fill="#0d1117" font-family="system-ui, Segoe UI, sans-serif" font-size="12" font-weight="600">28%</text>
  </g>
  <g transform="translate(0,342)">
    <text x="248" y="16" text-anchor="end" fill="#c9d1d9" font-family="system-ui, Segoe UI, sans-serif" font-size="13">Go (CLI / services)</text>
    <rect fill="#388bfd" x="260" y="4" width="168" height="18" rx="3"/>
    <text x="438" y="16" fill="#0d1117" font-family="system-ui, Segoe UI, sans-serif" font-size="12" font-weight="600">28%</text>
  </g>
  <g transform="translate(0,374)">
    <text x="248" y="16" text-anchor="end" fill="#c9d1d9" font-family="system-ui, Segoe UI, sans-serif" font-size="13">GitHub Actions (CI/CD)</text>
    <rect fill="#6e7681" x="260" y="4" width="30" height="18" rx="3"/>
    <text x="298" y="16" fill="#c9d1d9" font-family="system-ui, Segoe UI, sans-serif" font-size="12" font-weight="600">5%</text>
  </g>
  <g transform="translate(0,406)">
    <text x="248" y="16" text-anchor="end" fill="#c9d1d9" font-family="system-ui, Segoe UI, sans-serif" font-size="13">Terraform + observability</text>
    <rect fill="#6e7681" x="260" y="4" width="36" height="18" rx="3"/>
    <text x="304" y="16" fill="#c9d1d9" font-family="system-ui, Segoe UI, sans-serif" font-size="12" font-weight="600">6%</text>
  </g>
  <g transform="translate(260,488)">
    <rect fill="#238636" x="0" y="-10" width="12" height="12" rx="2"/>
    <text x="18" y="0" fill="#8b949e" font-family="system-ui, Segoe UI, sans-serif" font-size="11">Strong progress</text>
    <rect fill="#388bfd" x="130" y="-10" width="12" height="12" rx="2"/>
    <text x="148" y="0" fill="#8b949e" font-family="system-ui, Segoe UI, sans-serif" font-size="11">In progress</text>
    <rect fill="#6e7681" x="300" y="-10" width="12" height="12" rx="2"/>
    <text x="318" y="0" fill="#8b949e" font-family="system-ui, Segoe UI, sans-serif" font-size="11">Later focus</text>
