<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="920" height="520" role="img" aria-labelledby="title desc">
  <title id="title">Learning progress by topic</title>
  <desc id="desc">Self-assessed share of personal learning goals completed per area after a few months of focused study. Not a claim of full industry mastery.</desc>
  <!-- Inline fills/fonts: GitHub image proxy is reliable with attributes; external class-based CSS can be stripped. -->
  <rect fill="#0d1117" width="100%" height="100%" rx="12"/>
  <text x="460" y="36" text-anchor="middle" fill="#58A6FF" font-family="system-ui, Segoe UI, sans-serif" font-size="18" font-weight="600">Future plans (self-assessment)</text>
  <text x="460" y="56" text-anchor="middle" fill="#8b949e" font-family="system-ui, Segoe UI, sans-serif" font-size="12">~2-3 months of focused backend + DevOps study - bars are my own goals, not a hiring rubric</text>
  <text x="460" y="74" text-anchor="middle" fill="#8b949e" font-family="system-ui, Segoe UI, sans-serif" font-size="12">Each bar = how much of that topic I have covered in my plan so far</text>
  <text x="460" y="104" text-anchor="middle" fill="#8b949e" font-family="system-ui, Segoe UI, sans-serif" font-size="12">Completion %</text>
  <line x1="260" y1="448" x2="860" y2="448" stroke="#30363d" stroke-width="1" fill="none"/>
  <text x="260" y="462" fill="#8b949e" font-family="system-ui, Segoe UI, sans-serif" font-size="12">0</text>
  <text x="360" y="462" fill="#8b949e" font-family="system-ui, Segoe UI, sans-serif" font-size="12">20</text>
  <text x="460" y="462" fill="#8b949e" font-family="system-ui, Segoe UI, sans-serif" font-size="12">40</text>
  <text x="560" y="462" fill="#8b949e" font-family="system-ui, Segoe UI, sans-serif" font-size="12">60</text>
  <text x="660" y="462" fill="#8b949e" font-family="system-ui, Segoe UI, sans-serif" font-size="12">80</text>
  <text x="860" y="462" fill="#8b949e" font-family="system-ui, Segoe UI, sans-serif" font-size="12">100</text>
  <g stroke="#30363d" stroke-width="1" fill="none">
    <line x1="360" y1="114" x2="360" y2="442"/>
    <line x1="460" y1="114" x2="460" y2="442"/>
    <line x1="560" y1="114" x2="560" y2="442"/>
    <line x1="660" y1="114" x2="660" y2="442"/>
    <line x1="760" y1="114" x2="760" y2="442"/>
  </g>
  <g transform="translate(0,118)">
    <text x="248" y="16" text-anchor="end" fill="#c9d1d9" font-family="system-ui, Segoe UI, sans-serif" font-size="13">Linux + Bash</text>
    <rect fill="#238636" x="260" y="4" width="516" height="18" rx="3"/>
    <text x="786" y="16" fill="#0d1117" font-family="system-ui, Segoe UI, sans-serif" font-size="12" font-weight="600">86%</text>
  </g>
  <g transform="translate(0,150)">
    <text x="248" y="16" text-anchor="end" fill="#c9d1d9" font-family="system-ui, Segoe UI, sans-serif" font-size="13">Docker + Compose</text>
    <rect fill="#238636" x="260" y="4" width="534" height="18" rx="3"/>
    <text x="804" y="16" fill="#0d1117" font-family="system-ui, Segoe UI, sans-serif" font-size="12" font-weight="600">89%</text>
  </g>
  <g transform="translate(0,182)">
