<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 128" width="980" height="128" role="img" aria-labelledby="t1 d1">
  <title id="t1">Backend and APIs</title>
  <desc id="d1">Node.js, Express, REST APIs, Socket.io.</desc>
  <defs>
    <style><![CDATA[
      @keyframes pulse { 0%, 100% { opacity: 0.86; } 50% { opacity: 1; } }
      .s1 { animation: pulse 2.5s ease-in-out 0s infinite; }
      .s2 { animation: pulse 2.5s ease-in-out 0.25s infinite; }
      .s3 { animation: pulse 2.5s ease-in-out 0.5s infinite; }
      .s4 { animation: pulse 2.5s ease-in-out 0.75s infinite; }
    ]]></style>
  </defs>
  <rect width="980" height="128" fill="#0d1117" rx="8"/>
  <image href="https://skillicons.dev/icons?i=nodejs" x="100" y="10" width="44" height="44"/>
  <text x="122" y="72" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="700" font-family="system-ui,Segoe UI,sans-serif">Node.js</text>
  <text class="s1" x="122" y="102" text-anchor="middle" fill="#8b949e" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">evented runtime</text>

  <image href="https://skillicons.dev/icons?i=express" x="345" y="10" width="44" height="44"/>
  <text x="367" y="72" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="700" font-family="system-ui,Segoe UI,sans-serif">Express</text>
  <text class="s2" x="367" y="102" text-anchor="middle" fill="#8b949e" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">HTTP layer</text>

  <image href="https://skillicons.dev/icons?i=postman" x="590" y="10" width="44" height="44"/>
  <text x="612" y="72" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="700" font-family="system-ui,Segoe UI,sans-serif">REST APIs</text>
  <text class="s3" x="612" y="102" text-anchor="middle" fill="#8b949e" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">design &amp; testing</text>

  <image href="https://cdn.simpleicons.org/socketdotio/ffffff" x="835" y="10" width="44" height="44"/>
  <text x="857" y="72" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="700" font-family="system-ui,Segoe UI,sans-serif">Socket.io</text>
  <text class="s4" x="857" y="102" text-anchor="middle" fill="#8b949e" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">rooms, events &amp; fallbacks</text>
