<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 980 128" width="980" height="128" role="img" aria-labelledby="t1 d1">
  <title id="t1">DevOps and Cloud — row 1</title>
  <desc id="d1">Docker, Kubernetes, AWS, Nginx.</desc>
  <defs>
    <style><![CDATA[
      @keyframes pulse { 0%, 100% { opacity: 0.86; } 50% { opacity: 1; } }
      .s1 { animation: pulse 2.5s ease-in-out 0s infinite; }
      .s2 { animation: pulse 2.5s ease-in-out 0.25s infinite; }
      .s3 { animation: pulse 2.5s ease-in-out 0.5s infinite; }
      .s4 { animation: pulse 2.5s ease-in-out 0.75s infinite; }
    ]]></style>
  </defs>
  <rect width="980" height="128" fill="#0d1117" rx="8"/>
  <image href="icons/docker.svg" xlink:href="icons/docker.svg" x="100" y="10" width="44" height="44"/>
  <text x="122" y="72" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="700" font-family="system-ui,Segoe UI,sans-serif">Docker</text>
  <text class="s1" x="122" y="102" text-anchor="middle" fill="#8b949e" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">containers &amp; Compose</text>

  <image href="icons/kubernetes.svg" xlink:href="icons/kubernetes.svg" x="345" y="10" width="44" height="44"/>
  <text x="367" y="72" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="700" font-family="system-ui,Segoe UI,sans-serif">Kubernetes</text>
  <text class="s2" x="367" y="102" text-anchor="middle" fill="#8b949e" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">pods, Helm (growing)</text>

  <image href="icons/aws.svg" xlink:href="icons/aws.svg" x="590" y="10" width="44" height="44"/>
  <text x="612" y="72" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="700" font-family="system-ui,Segoe UI,sans-serif">AWS</text>
  <text class="s3" x="612" y="102" text-anchor="middle" fill="#8b949e" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">EC2, S3, IAM basics</text>

  <image href="icons/nginx.svg" xlink:href="icons/nginx.svg" x="835" y="10" width="44" height="44"/>
  <text x="857" y="72" text-anchor="middle" fill="#f0f6fc" font-size="14" font-weight="700" font-family="system-ui,Segoe UI,sans-serif">Nginx</text>
  <text class="s4" x="857" y="102" text-anchor="middle" fill="#8b949e" font-size="12" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">reverse proxy &amp; TLS</text>
